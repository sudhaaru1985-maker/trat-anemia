<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRAT — Anaemia Scratch Cards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-em: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-hint: #9e9e9a;
    --purple: #7F77DD;
    --purple-dark: #534AB7;
    --purple-light: #EEEDFE;
    --green-bg: #EAF3DE;
    --green-text: #3B6D11;
    --green-border: #C0DD97;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --amber-text: #BA7517;
    --orange-bg: #FAECE7;
    --orange-text: #993C1D;
    --orange-border: #F5C4B3;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font: 'Georgia', 'Times New Roman', serif;
    --font-ui: system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.1);
      --border-em: rgba(255,255,255,0.2);
      --text: #f0efe9;
      --text-muted: #9e9e9a;
      --text-hint: #6b6b67;
      --purple-light: #2a2760;
      --green-bg: #173404;
      --green-text: #97C459;
      --green-border: #27500A;
      --red-bg: #501313;
      --red-text: #F09595;
      --orange-bg: #412402;
      --orange-text: #EF9F27;
      --orange-border: #633806;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* ── Setup ── */
  .setup-header { margin-bottom: 2rem; }
  .setup-header h1 { font-family: var(--font); font-size: 28px; font-weight: normal; color: var(--text); letter-spacing: -0.3px; }
  .setup-header p { font-size: 14px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

  .setup-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
  .field-group label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.4px; text-transform: uppercase; }
  .field-group input {
    height: 38px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-em);
    padding: 0 12px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    width: 100%;
    font-family: var(--font-ui);
  }
  .field-group input:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-light); }
  .start-btn {
    height: 38px; padding: 0 20px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--purple); color: #fff;
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font-ui);
    transition: background 0.15s;
    white-space: nowrap;
  }
  .start-btn:hover { background: var(--purple-dark); }
  .start-btn:disabled { background: var(--border); color: var(--text-hint); cursor: default; }

  /* ── Main header ── */
  .main-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 1rem;
  }
  .main-header h1 { font-family: var(--font); font-size: 24px; font-weight: normal; color: var(--text); margin-bottom: 3px; }
  .team-label { font-size: 13px; color: var(--text-muted); }
  .team-label strong { color: var(--text); font-weight: 500; }

  .meta-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .stat-pill {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 14px; text-align: center; min-width: 60px;
  }
  .stat-pill .val { font-size: 18px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-pill .lbl { font-size: 11px; color: var(--text-muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.4px; }
  .timer-pill { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; text-align: center; }
  .timer-pill .val { font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; color: var(--text); }
  .timer-pill .lbl { font-size: 11px; color: var(--text-muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.4px; }
  .timer-pill.warning .val { color: var(--amber-text); }
  .timer-pill.danger .val { color: var(--red-text); }
  .pause-btn {
    display: block; width: 100%; margin-top: 4px;
    background: none; border: 0.5px solid var(--border-em);
    border-radius: 6px; padding: 3px 8px;
    font-size: 11px; cursor: pointer; color: var(--text-muted);
    font-family: var(--font-ui);
  }
  .pause-btn:hover { background: var(--bg); }

  /* ── Progress ── */
  .progress-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 3px; background: var(--purple); border-radius: 2px; transition: width 0.4s ease; }

  /* ── Question cards ── */
  .q-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    transition: opacity 0.2s;
  }
  .q-card.locked { opacity: 0.45; pointer-events: none; }
  .q-num { font-size: 11px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .q-text { font-size: 15px; color: var(--text); line-height: 1.65; margin-bottom: 1rem; font-family: var(--font); }
  .q-image {
    width: 100%; max-width: 400px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    display: block; margin-bottom: 1rem;
  }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .scratch-btn {
    position: relative; overflow: hidden;
    border: 1.5px solid var(--border-em);
    border-radius: var(--radius-sm);
    height: 54px; width: 100%;
    cursor: pointer; background: transparent; padding: 0;
  }
  .scratch-btn:hover:not(:disabled) { border-color: var(--purple); }
  .scratch-btn:disabled { cursor: default; }

  .scratch-cover {
    position: absolute; inset: 0;
    background: var(--purple);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: #fff;
    border-radius: calc(var(--radius-sm) - 1px);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    transform-origin: center;
    user-select: none;
    letter-spacing: 0.5px;
  }
  .scratch-cover.scratched { transform: scale(0.04); opacity: 0; pointer-events: none; }

  .scratch-reveal {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 13px; font-weight: 500;
    border-radius: calc(var(--radius-sm) - 1px);
    padding: 0 10px; text-align: center; line-height: 1.3;
    color: var(--text-muted);
    font-family: var(--font-ui);
  }
  .reveal-correct { background: var(--green-bg); color: var(--green-text); }
  .reveal-wrong { background: var(--red-bg); color: var(--red-text); }

  /* ── Status row ── */
  .q-status { margin-top: 10px; min-height: 22px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .dot.used { background: var(--red-text); }
  .dot.success { background: var(--green-text); }
  .pts-badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .pts-correct { background: var(--green-bg); color: var(--green-text); }
  .pts-zero { background: var(--bg); color: var(--text-muted); border: 0.5px solid var(--border); }
  .pts-label { font-size: 12px; color: var(--text-muted); }
  .dot-row { display: flex; gap: 5px; align-items: center; }

  /* ── Banners ── */
  .banner { border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; text-align: center; margin-top: 1rem; display: none; }
  .banner.show { display: block; }
  .banner-done { background: var(--green-bg); border: 0.5px solid var(--green-border); }
  .banner-done p { color: var(--green-text); font-size: 16px; font-weight: 500; margin-bottom: 4px; font-family: var(--font); }
  .banner-done span { font-size: 13px; color: var(--green-text); opacity: 0.8; }
  .banner-timeout { background: var(--orange-bg); border: 0.5px solid var(--orange-border); }
  .banner-timeout p { color: var(--orange-text); font-size: 16px; font-weight: 500; margin-bottom: 4px; font-family: var(--font); }
  .banner-timeout span { font-size: 13px; color: var(--orange-text); opacity: 0.8; }
  .reset-btn {
    font-size: 13px; padding: 7px 16px; cursor: pointer;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-em);
    background: var(--surface); color: var(--text-muted);
    margin-top: 12px; font-family: var(--font-ui);
    transition: background 0.15s;
  }
  .reset-btn:hover { background: var(--bg); }
</style>
</head>
<body>
<div class="container">

  <!-- Setup -->
  <div id="setup-section">
    <div class="setup-header">
      <h1>TRAT — Anaemia</h1>
      <p>Enter your team name and set a time limit, then press Start to begin the scratch card session.</p>
    </div>
    <div class="setup-card">
      <div class="field-group">
        <label>Team name</label>
        <input type="text" id="team-input" placeholder="e.g. Team Alpha" maxlength="40" />
      </div>
      <div class="field-group" style="max-width:120px;">
        <label>Time limit (min)</label>
        <input type="number" id="timer-input" value="15" min="1" max="60" />
      </div>
      <button class="start-btn" id="start-btn" onclick="startSession()">Start ▶</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main-content" style="display:none;">
    <div class="main-header">
      <div>
        <h1>TRAT — Anaemia</h1>
        <div class="team-label">Team: <strong id="team-display"></strong></div>
      </div>
      <div class="meta-bar">
        <div class="stat-pill"><div class="val" id="total-score">0</div><div class="lbl">Score</div></div>
        <div class="stat-pill"><div class="val" id="max-score">40</div><div class="lbl">Max</div></div>
        <div class="stat-pill"><div class="val" id="q-done">0/10</div><div class="lbl">Done</div></div>
        <div class="timer-pill" id="timer-card">
          <div class="val" id="timer-display">--:--</div>
          <div class="lbl">Remaining</div>
          <button class="pause-btn" id="pause-btn" onclick="togglePause()">Pause</button>
        </div>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
    <div id="cards-container"></div>
    <div class="banner banner-done" id="done-banner">
      <p id="done-msg"></p>
      <span id="done-sub"></span><br>
      <button class="reset-btn" onclick="resetAll()">Reset &amp; new session</button>
    </div>
    <div class="banner banner-timeout" id="timeout-banner">
      <p id="timeout-msg"></p>
      <span id="timeout-sub"></span><br>
      <button class="reset-btn" onclick="resetAll()">Reset &amp; new session</button>
    </div>
  </div>

</div>

<script>
const QUESTIONS = [
  {
    text: "A 25-year-old woman presents with fatigue, pallor, and heavy menstrual bleeding. Her CBC shows Hb 8 g/dL and MCV 70 fL. Which of the following is the most likely classification of her anemia?",
    choices: ["A. Normocytic, normochromic", "B. Microcytic, hypochromic", "C. Macrocytic, normochromic", "D. Normocytic, hypochromic"],
    correct: 1, image: null
  },
  {
    text: "A 60-year-old man with chronic kidney disease presents with fatigue. His Hb is 9 g/dL and reticulocyte count is low. The anemia is most likely due to:",
    choices: ["A. Increased red cell destruction", "B. Impaired erythropoietin production", "C. Iron deficiency", "D. Vitamin B12 deficiency"],
    correct: 1, image: null
  },
  {
    text: "A peripheral blood smear shows a large number of sickle-shaped RBCs. This finding is most consistent with which of the following abnormalities?",
    choices: ["A. Defective hemoglobin", "B. RBC membrane defect", "C. Enzyme deficiency", "D. Mechanical trauma"],
    correct: 0, image: null
  },
  {
    text: "In which condition would you most likely see the cells shown in the image on a peripheral blood smear?",
    choices: ["A. Acute blood loss", "B. Iron deficiency anemia", "C. Thalassemia", "D. Aplastic anemia"],
    correct: 2, image: "nRBC.webp"
  },
  {
    text: "A 5-year-old with hemolytic anemia has developed frontal bossing and facial deformities. Which mechanism explains these facial abnormalities?",
    choices: ["A. Bone fracture", "B. Osteoporosis", "C. Erythroid hyperplasia", "D. Hemolysis in the bone marrow"],
    correct: 2, image: null
  },
  {
    text: "A 50-year-old presents with anemia. Peripheral smear shows basophilic stippling. Which is the most likely underlying cause?",
    choices: ["A. Vitamin B12 deficiency", "B. Lead poisoning", "C. Acute blood loss", "D. Aplastic anemia"],
    correct: 1, image: null
  },
  {
    text: "A 19-year-old presents with fatigue. CBC shows Hb 10 g/dL and MCV 110 fL. Which condition is most consistent with this morphological classification?",
    choices: ["A. Iron deficiency anemia", "B. Thalassemia", "C. Vitamin B12 deficiency", "D. Acute blood loss"],
    correct: 2, image: null
  },
  {
    text: "Identify the cells indicated in the image below:",
    choices: ["A. Elliptocytes", "B. Schistocytes", "C. Spherocytes", "D. Acanthocytes"],
    correct: 2, image: "schistocytes.webp"
  },
  {
    text: "A 25-year-old woman presents with fatigue and shortness of breath. Her Hb is 7 g/dL. Which physiological consequence is most likely responsible for her symptoms?",
    choices: ["A. Increased oxygen carrying capacity", "B. Tissue hypoxia", "C. Decreased cardiac output", "D. Reduced erythropoietin secretion"],
    correct: 1, image: null
  },
  {
    text: "A 30-year-old male presents with fatigue, jaundice, and dark red urine, suspected of intravascular hemolysis. Which laboratory finding will be observed?",
    choices: ["A. Hemoglobinuria", "B. High serum haptoglobin", "C. Decreased lactate dehydrogenase", "D. Reticulocytosis"],
    correct: 0, image: null
  }
];

const IFAT = [4, 2, 1, 0];
let state = [], timerInterval = null, secondsLeft = 0, paused = false;

function startSession() {
  const name = document.getElementById('team-input').value.trim();
  const mins = parseInt(document.getElementById('timer-input').value) || 15;
  if (!name) { document.getElementById('team-input').focus(); return; }
  document.getElementById('team-display').textContent = name;
  secondsLeft = mins * 60; paused = false;
  document.getElementById('setup-section').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  state = QUESTIONS.map(() => ({ attempts: 0, solved: false, points: 0 }));
  buildCards(); startTimer();
}

function startTimer() {
  clearInterval(timerInterval); updateTimerDisplay();
  timerInterval = setInterval(() => {
    if (paused) return;
    secondsLeft--; updateTimerDisplay();
    if (secondsLeft <= 0) { clearInterval(timerInterval); timeOut(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(Math.max(secondsLeft,0)/60), s = Math.max(secondsLeft,0)%60;
  document.getElementById('timer-display').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const c = document.getElementById('timer-card');
  c.className = 'timer-pill';
  if (secondsLeft <= 60) c.classList.add('danger');
  else if (secondsLeft <= 180) c.classList.add('warning');
}

function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? 'Resume' : 'Pause';
}

function timeOut() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.add('locked'));
  const score = totalScore(), max = QUESTIONS.length * 4;
  const team = document.getElementById('team-display').textContent;
  document.getElementById('timeout-msg').textContent = "Time's up — " + team + "!";
  document.getElementById('timeout-sub').textContent = 'Final score: ' + score + ' / ' + max + ' (' + Math.round(score/max*100) + '%)';
  document.getElementById('timeout-banner').classList.add('show');
  document.getElementById('pause-btn').disabled = true;
}

function totalDone() { return state.filter(s => s.solved || s.attempts >= 4).length; }
function totalScore() { return state.reduce((a,s) => a + s.points, 0); }

function updateHeader() {
  const done = totalDone(), total = QUESTIONS.length;
  document.getElementById('total-score').textContent = totalScore();
  document.getElementById('q-done').textContent = done + '/' + total;
  document.getElementById('progress-bar').style.width = Math.round(done/total*100) + '%';
  if (done === total) {
    clearInterval(timerInterval);
    const score = totalScore(), max = total * 4, pct = Math.round(score/max*100);
    const team = document.getElementById('team-display').textContent;
    document.getElementById('done-msg').textContent = team + ' — all done! Score: ' + score + ' / ' + max;
    document.getElementById('done-sub').textContent = pct + '% — ' + (pct>=75?'Excellent teamwork!':pct>=50?'Good effort!':'Keep reviewing the material.');
    document.getElementById('done-banner').classList.add('show');
    document.getElementById('pause-btn').disabled = true;
  }
}

function scratch(qi, ci) {
  const s = state[qi];
  if (s.solved || s.attempts >= 4 || paused) return;
  document.getElementById('cover-'+qi+'-'+ci).classList.add('scratched');
  document.getElementById('btn-'+qi+'-'+ci).disabled = true;
  const reveal = document.getElementById('reveal-'+qi+'-'+ci);
  const isCorrect = ci === QUESTIONS[qi].correct;
  reveal.className = 'scratch-reveal ' + (isCorrect ? 'reveal-correct' : 'reveal-wrong');
  reveal.innerHTML = '<span>' + (isCorrect?'✓':'✗') + '</span><span>' + QUESTIONS[qi].choices[ci] + '</span>';
  s.attempts++;
  if (isCorrect) { s.solved = true; s.points = IFAT[Math.min(s.attempts-1,3)]; disableQ(qi); showStatus(qi,true,s.points); }
  else if (s.attempts >= 4) { s.points = 0; disableQ(qi); showStatus(qi,false,0); }
  else { showStatus(qi,null,null,s.attempts); }
  updateHeader();
}

function disableQ(qi) { for(let i=0;i<4;i++){const b=document.getElementById('btn-'+qi+'-'+i);if(b)b.disabled=true;} }

function showStatus(qi, correct, pts, attempts) {
  const el = document.getElementById('status-'+qi);
  if (correct === true) {
    el.innerHTML = '<span class="pts-badge pts-correct">+'+pts+' pts</span><span class="pts-label">Correct on attempt '+(IFAT.indexOf(pts)+1)+'</span>';
  } else if (correct === false) {
    el.innerHTML = '<span class="pts-badge pts-zero">0 pts</span><span class="pts-label">No correct answer found</span>';
  } else {
    let dots = '<div class="dot-row">';
    for(let i=0;i<4;i++) dots += '<div class="dot '+(i<attempts?'used':'')+'"></div>';
    dots += '</div>';
    el.innerHTML = dots + '<span class="pts-label">Next correct = '+IFAT[attempts]+' pts</span>';
  }
}

function buildCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    const imgHTML = q.image ? '<img src="'+q.image+'" class="q-image" alt="Blood smear for Q'+(qi+1)+'" />' : '';
    let ch = '';
    q.choices.forEach((c,ci) => {
      ch += '<button class="scratch-btn" id="btn-'+qi+'-'+ci+'" onclick="scratch('+qi+','+ci+')">'
          + '<div class="scratch-reveal" id="reveal-'+qi+'-'+ci+'">'+c+'</div>'
          + '<div class="scratch-cover" id="cover-'+qi+'-'+ci+'">'+c.charAt(0)+'</div>'
          + '</button>';
    });
    card.innerHTML = '<div class="q-num">Question '+(qi+1)+' of '+QUESTIONS.length+'</div>'
      + '<div class="q-text">'+q.text+'</div>'
      + imgHTML
      + '<div class="choices">'+ch+'</div>'
      + '<div class="q-status" id="status-'+qi+'">'
      + '<div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'
      + '<span class="pts-label">Scratch to answer — first correct = 4 pts</span></div>';
    container.appendChild(card);
  });
  document.getElementById('done-banner').classList.remove('show');
  document.getElementById('timeout-banner').classList.remove('show');
  updateHeader();
}

function resetAll() {
  clearInterval(timerInterval); state = []; paused = false;
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('setup-section').style.display = 'block';
  document.getElementById('start-btn').disabled = false;
  document.getElementById('team-input').value = '';
  document.getElementById('timer-input').value = '15';
  document.getElementById('pause-btn').disabled = false;
  document.getElementById('pause-btn').textContent = 'Pause';
}
</script>
</body>
</html>
